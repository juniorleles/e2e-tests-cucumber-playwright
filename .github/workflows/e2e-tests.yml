name: E2E Tests — Cucumber + Playwright

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Instalar Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Rodar Tarefa 1 — Login (The Internet)
        run: npm run test:login
        env:
          HEADLESS: true
        continue-on-error: true

      - name: Rodar Tarefa 2 — Checkout (SauceDemo)
        run: npm run test:checkout
        env:
          HEADLESS: true
        continue-on-error: true

      - name: Gerar relatório HTML unificado
        if: always()
        run: npm run report:html
        continue-on-error: true

      - name: Upload relatório completo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-completo
          path: |
            reports/cucumber-report.html
            reports/login-report.html
            reports/checkout-report.html
            reports/html-report/
            reports/screenshots/
          retention-days: 30
